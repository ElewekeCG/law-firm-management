version: '3.8'

services:

  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: lawpilot-app
    restart: always
    ports:
      - "80:80"
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      GOOGLE_APPLICATION_CREDENTIALS: /var/www/html/storage/credentials/service-account-credentials.json
    volumes:
      - ./storage/credentials:/var/www/html/storage/credentials:ro
      - app_storage:/var/www/html/storage/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lawpilot

  db:
    image: mysql:8.0
    container_name: lawpilot-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lawpilot

  redis:
    image: redis:7-alpine
    container_name: lawpilot-redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lawpilot

  queue:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: lawpilot-queue
    restart: always
    command: php artisan queue:work --sleep=3 --tries=3
    environment:
      APP_KEY: ${APP_KEY}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lawpilot

  scheduler:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: lawpilot-scheduler
    restart: always
    command: php artisan schedule:work
    environment:
      APP_KEY: ${APP_KEY}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lawpilot

volumes:
  db_data:
  redis_data:
  app_storage:

networks:
  lawpilot:
    driver: bridge
